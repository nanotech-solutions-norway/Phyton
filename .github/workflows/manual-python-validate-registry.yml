name: Manual - Python Validate Registry

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        default: development
        options:
          - development

permissions:
  contents: read
  actions: read

jobs:
  validate-python-registry:
    name: Validate Python script registry
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            python/requirements.txt
            python/requirements-dev.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt

      - name: Enforce registry validation policy
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.target_environment }}" != "development" ]; then
            echo "Phase 3 registry validation only permits target_environment=development."
            exit 1
          fi

      - name: Validate Python script registry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/python-registry-validation
          python -m python.tools.validate_script_registry \
            --output-dir artifacts/python-registry-validation \
            | tee artifacts/python-registry-validation/stdout.txt

      - name: Upload Python registry validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-registry-validation-report
          path: artifacts/python-registry-validation/**
          if-no-files-found: warn
